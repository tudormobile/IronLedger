name: Publish Docs
# Trigger the action on push to main
on:
  workflow_dispatch:
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false
  
jobs:
  publish-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Dotnet Setup
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.0.100
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Unit tests and unit test test annotations are included here because the output is embedded in the documentation. 
      - name: Unit tests
        run: |
          cd src
          dotnet test --filter "TestCategory!=Integration" --coverage --report-trx
      - name: Unit Test Annotations
        run: |
          cd src
          if (dotnet tool list -g | Select-String 'dotnet-coverage') {
            dotnet tool update -g dotnet-Coverage --version 18.1.0
          } else {
            dotnet tool install -g dotnet-Coverage --version 18.1.0
          }
          if (dotnet tool list -g | Select-String 'dotnet-reportgenerator-globaltool') {
            dotnet tool update -g dotnet-reportgenerator-globaltool --version 5.4.3
          } else {
            dotnet tool install -g dotnet-reportgenerator-globaltool --version 5.4.3
          }
          dotnet-coverage merge **\*.coverage --remove-input-files --output-format xml --output output.xml
          reportgenerator -reports:"output.xml" -targetdir:"output" -reporttypes:"MarkdownSummaryGithub"
          echo "### Test Results" >> "$env:GITHUB_STEP_SUMMARY"
          Get-ChildItem -Recurse -Filter *.trx | ForEach-Object { Get-Content $_.FullName | Select-String 'executed=\"(\d+)\" passed=\"(\d+)\" failed=\"(\d+)\"' | ForEach-Object { ":purple_circle: Tests: " + $_.Matches[0].Groups[1].Value + " :green_circle: Passed: " + $_.Matches[0].Groups[2].Value + " :red_circle: Failed: " + $_.Matches[0].Groups[3].Value } } >> "$env:GITHUB_STEP_SUMMARY"
          echo "### Code Coverage" >> "$env:GITHUB_STEP_SUMMARY"
          Get-Content output\SummaryGithub.md | Select-String '<summary>(.+%)</summary>' | ForEach-Object { $_.Matches[0].Groups[1].Value } >> "$env:GITHUB_STEP_SUMMARY"

      - name: Documentation
        run: |
          dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github-packages "https://nuget.pkg.github.com/dotnet/index.json"
          if (dotnet tool list -g | Select-String '^docfx\s') {
            dotnet tool update -g docfx --version 2.78.3 --add-source github-packages
          } else {
            dotnet tool install -g docfx --version 2.78.3 --add-source github-packages
          }
          docfx docs/docfx.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          # Upload entire repository
          path: 'docs/_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
